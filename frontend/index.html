<!doctype html>
<html lang="es" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Trading Quant Lab - Comunidad cuantitativa de trading con validación matemática rigurosa" />
    <title>Trading Quant Lab | Rigor Matemático en Trading</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

    <!-- Tailwind Config with Design System Tokens -->
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-surface-variant": "#bbc9cf",
              "error-container": "#93000a",
              "surface-container-low": "#161c22",
              "on-tertiary-fixed": "#2e1500",
              "surface-container-high": "#252b31",
              "primary-fixed-dim": "#00daf3",
              "secondary-fixed-dim": "#bac8da",
              "surface-container": "#1a2027",
              "error": "#ffb4ab",
              "surface-variant": "#2f353c",
              "surface": "#0e141a",
              "surface-container-lowest": "#090f15",
              "surface-bright": "#343a41",
              "on-surface": "#dde3ec",
              "primary": "#8aedff",
              "inverse-surface": "#dde3ec",
              "on-secondary-container": "#acbacc",
              "on-error": "#690005",
              "tertiary-container": "#ffb26c",
              "inverse-on-surface": "#2b3138",
              "secondary": "#bac8da",
              "on-tertiary-fixed-variant": "#6c3a00",
              "tertiary-fixed-dim": "#ffb778",
              "on-primary": "#00363d",
              "surface-container-highest": "#2f353c",
              "on-secondary-fixed-variant": "#3b4857",
              "on-error-container": "#ffdad6",
              "on-background": "#dde3ec",
              "outline-variant": "#3c494e",
              "on-primary-fixed": "#001f24",
              "tertiary-fixed": "#ffdcc1",
              "on-primary-container": "#005964",
              "on-tertiary": "#4c2700",
              "primary-fixed": "#9cf0ff",
              "on-primary-fixed-variant": "#004f58",
              "surface-dim": "#0e141a",
              "on-secondary-fixed": "#0f1d2a",
              "outline": "#859398",
              "tertiary": "#ffd7b7",
              "on-secondary": "#243240",
              "on-tertiary-container": "#794200",
              "primary-container": "#00d6ee",
              "secondary-container": "#3d4a5a",
              "secondary-fixed": "#d6e4f7",
              "surface-tint": "#00daf3",
              "inverse-primary": "#006875",
              "background": "#0e141a"
            },
            fontFamily: {
              "headline": ["Space Grotesk", "sans-serif"],
              "body": ["Manrope", "sans-serif"],
              "label": ["Inter", "sans-serif"]
            },
            borderRadius: {
              "DEFAULT": "0.125rem",
              "lg": "0.25rem",
              "xl": "0.5rem",
              "full": "0.75rem"
            }
          }
        }
      }
    </script>

    <!-- Custom CSS -->
    <style>
      .glass-panel {
        background: rgba(37, 43, 49, 0.8);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: #0e141a;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #2f353c;
        border-radius: 10px;
      }
    </style>
  </head>
  <body class="bg-background text-on-background font-body selection:bg-primary selection:text-on-primary">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Handle 404.html redirect for SPA routing -->
    <script>
      (function() {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
      }());
    </script>
  </body>
</html>

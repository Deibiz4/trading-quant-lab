<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script type="text/javascript">
      // Handle 404 for Single Page Apps on GitHub Pages
      // Store the path that triggered the 404, then redirect to index.html
      // The app will read sessionStorage and use history.replaceState
      var l = window.location;
      var path = l.pathname.replace(/^\/trading-quant-lab/, '');
      sessionStorage.redirect = path + (l.search ? l.search : '') + (l.hash ? l.hash : '');
      l.replace('/trading-quant-lab/');
    </script>
  </head>
  <body>
  </body>
</html>
